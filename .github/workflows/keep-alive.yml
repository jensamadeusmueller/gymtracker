    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://wyopojaixsutxhkdpqcf.supabase.co/rest/v1/workouts?limit=1" \
            -H "apikey: sb_publishable_iU8Wj16eh1U0DXLLauq_PA_775zq5LW" \
            -H "Authorization: Bearer sb_publishable_iU8Wj16eh1U0DXLLauq_PA_775zq5LW")
          echo "Supabase ping status: $STATUS"
